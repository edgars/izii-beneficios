                properties:
                  sucesso:
                    type: boolean
                    example: true
                  mensagem:
                    type: string
                    example: "Movimentação registrada com sucesso sob a transação guid."
                  guidProcessamento:
                    type: string
                    format: uuid
                    example: "c9a8b7c6-d5e4-4321-f0ed-ba9876543210"
        '400':
          description: Erro na requisição (validação de schema ou inconsistência de regras de negócio).
        '500':
          description: Erro interno no Orquestrador ou indisponibilidade da operadora de saúde.

components:
  schemas:
    MovimentacaoBase:
      type: object
      required:
        - cnpjProvedor
        - movimento
        - login
        - senha
        - origem
      properties:
        cnpjProvedor:
          type: string
          description: CNPJ da Operadora de saúde de destino.
          example: "99999999999999"
        movimento:
          type: string
          description: |
            Tipo de movimentação principal executada na requisição Base.
            * `I` - Inclusão (Requer preencher o array `inclusao`)
            * `A` - Alteração (Requer preencher o objeto `alteracao`)
            * `E` - Exclusão (Requer preencher o objeto `exclusao`)
            * `T` - Troca de Plano (Requer preencher o array `trocaPlano`)
            * `R` - Reativação (Requer preencher o array `reativacao`)
            * `C` - Consulta (Requer preencher o objeto `consulta`)
          enum: [I, A, E, T, R, C]
          example: "I"
        login:
          type: string
          description: Usuário de autenticação na API da Operadora.
          example: "MT9999999"
        senha:
          type: string
          description: Senha de autenticação na API da Operadora.
          example: "********"
        origem:
          type: integer
          description: |
            Código de origem da transação.
            * `0` - Origem padrão (Protheus / sistema legível do cliente).
            * `1` - Outra origem (RPA / integração interna).
          enum: [0, 1]
          example: 0
        guidProdutoBeneficiario:
          type: string
          format: uuid
          nullable: true
          description: Campo para uso do cliente. Sem efeito operacional no orquestrador.
          example: "a1b2c3d4-e5f6-7890-abcd-1234567890ab"
        guidFilaDeIntegracao:
          type: string
          format: uuid
          nullable: true
          description: Identificador para uso do cliente. Sem efeito operacional no orquestrador.
          example: "f0e9d8c7-b6a5-4321-fedc-ba9876543210"

        # Estruturas Condicionais de Fluxos
        inclusao:
          type: array
          description: Preenchido se `movimento` for `I`. Array de novos beneficiários para inclusão.
          items:
            $ref: '#/components/schemas/BeneficiarioInclusao'
        alteracao:
          $ref: '#/components/schemas/BeneficiarioAlteracao'
        exclusao:
          $ref: '#/components/schemas/BeneficiarioExclusao'
        trocaPlano:
          type: array
          description: Preenchido se `movimento` for `T`. Contém dados da troca de plano.
          items:
            $ref: '#/components/schemas/BeneficiarioTrocaPlano'
        reativacao:
          type: array
          description: Preenchido se `movimento` for `R`. Contém chaves e datas de reativação.
          items:
            $ref: '#/components/schemas/BeneficiarioReativacao'
        consulta:
          $ref: '#/components/schemas/BeneficiarioConsulta'

    Endereco:
      type: object
      properties:
        cep:
          type: string
          example: "01310100"
        logradouro:
          type: string
          example: "Av. Paulista"
        numero:
          type: string
          example: "1000"
        complemento:
          type: string
          nullable: true
          example: "Apto 101"
        bairro:
          type: string
          example: "Bela Vista"
        municipio:
          type: string
          example: "Sao Paulo"
        codMunicipio:
          type: string
          description: Código IBGE do município do endereço.
          example: "3550308"
        codMunicipioNascimentoIbge:
          type: string
          description: Código IBGE do município de nascimento.
          example: "3550308"
        codMunicipioNascimentoCorreio:
          type: string
          example: "01000"
        uf:
          type: string
          maxLength: 2
          example: "SP"
        regiao:
          type: string
          description: Região geográfica mapeada. Ex. SE (Sudeste).
          example: "SE"

    Contato:
      type: object
      properties:
        email:
          type: string
          format: email
          example: "joao.silva@acme.com.br"
        email1:
          type: string
          format: email
          nullable: true
          example: "joao.pessoal@gmail.com"
        dddCelular:
          type: string
          maxLength: 2
          example: "11"
        dddCelular1:
          type: string
          maxLength: 2
          nullable: true
          example: "11"
        dddTelefone1:
          type: string
          maxLength: 2
          nullable: true
          example: "11"
        telefone1:
          type: string
          nullable: true
          example: "33334444"
        celular:
          type: string
          example: "999998888"
        celular1:
          type: string
          nullable: true
          example: "988887777"
        ramalTelefone1:
          type: string
          nullable: true
          example: "1234"
        ramal:
          type: string
          nullable: true
          example: "5678"

    DadosBancarios:
      type: object
      nullable: true
      properties:
        banco:
          type: string
          description: Código de compensação BACEN do Banco (Ex. 237 = Bradesco).
          example: "237"
        agencia:
          type: string
          example: "1234"
        digitoAgencia:
          type: string
          nullable: true
          example: "5"
        conta:
          type: string
          example: "00012345"
        digitoConta:
          type: string
          example: "6"
        tipoConta:
          type: string
          description: |
            Tipo de conta bancária.
            * `ContaPoupanca` - Saída Convertida p/ Bradesco: '2'
            * Qualquer outro valor - Saída Convertida p/ Bradesco: '0' (Conta Corrente)
          example: "CC"
        numero:
          type: string
          description: Número completo (Conta + Dígito) formatado.
          example: "00012345-6"
        tipoOperacao:
          type: string
          nullable: true
          example: "001"

    Produto:
      type: object
      properties:
        contrato:
          type: string
          example: "789"
        carteirinha:
          type: string
          nullable: true
          example: ""
        subContrato:
          type: string
          example: "001"
        codigo:
          type: string
          description: Código identificador do plano corporativo contratado.
          example: "PLANO-ENF-01"
        codigoRDP:
          type: string
          nullable: true
          example: "RDP-001"
        dataAlteracaoPlano:
          type: string
          format: date-time
          nullable: true
          example: "2026-06-01T00:00:00"
        dataInicioContrato:
          type: string
          format: date-time
          example: "2026-05-15T00:00:00"
        motivoAlteracao:
          type: string
          nullable: true
          example: "UPGRADE_VOLUNTARIO"

    Apolice:
      type: object
      properties:
        cia:
          type: string
          example: "BRADESCO"
        numero:
          type: string
          example: "123456"
        subfatura:
          type: string
          example: "001"

    BeneficiarioInclusao:
      type: object
      properties:
        operacao:
          type: string
          enum: [I]
          description: Deve possuir o mesmo movimento da requisição Base (`I`).
        nome:
          type: string
          example: "Joao da Silva"
        nomeAbreviado:
          type: string
          example: "JOAO SILVA"
        cpf:
          type: string
          example: "99999999999"
        dataNascimento:
          type: string
          format: date-time
          example: "1985-03-12T00:00:00"
        grauParentesco:
          type: string
          description: |
            Grau de Parentesco padrão Protheus:
            * `0` - Titular (Usado pelo Bradesco para cindir titular de dependentes).
            * `1` - Cônjuge / Companheiro(a) (Unimed converte para Esposa se `sexo=F` ou Marido se `sexo=M`).
            * `2` - Filho(a) (Unimed mapeia para Filha se `sexo=F` ou Filho se `sexo=M`).
            * Outros valores numéricos estruturados são repassados de forma direta.
          example: "0"
        estadoCivil:
          type: string
          description: |
            Estado civil do beneficiário:
            * `S` ou `1` - Solteiro
            * `C` ou `2` - Casado
            * `V` ou `3` - Viúvo
            * Outros caracteres (ex: D, U) - Mapeados como '4' no padrão Bradesco.
