openapi: 3.0.3
info:
  title: Orquestrador API Beneficiários (IZII)
  description: |
    API unificada para movimentação cadastral de beneficiários junto a operadoras de saúde (Bradesco, SulAmérica, Unimed, etc.).
      
    Esta API suporta operações de **Inclusão**, **Alteração**, **Exclusão**, **Troca de Plano**, **Reativação** e **Consulta** através de payloads dinâmicos controlados pelo campo `movimento`.
  version: 1.0.0
servers:
  - url: https://api./v1
    description: Sandbox / Homologação
paths:
  /beneficiarios/movimentacao:
    post:
      summary: Executar Movimentação de Beneficiário
      description: Rota única que orquestra as ações cadastrais dependendo do tipo de movimento informado na base do payload.
